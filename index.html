<!DOCTYPE html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <title>Dirole - Termômetro Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              dirole: {
                bg: '#0f0518', // Deeper purple/black
                card: '#1e1b2e', 
                primary: '#8b5cf6', // Violet 500
                secondary: '#d946ef', // Fuchsia 500
                accent: '#06b6d4', // Cyan 500
                success: '#10b981',
                warning: '#f59e0b',
                danger: '#ef4444',
              }
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'slide-up': 'slideUp 0.3s ease-out forwards',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
            },
            keyframes: {
              slideUp: {
                '0%': { transform: 'translateY(100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Hide scrollbar for mobile-like feel */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      body {
        background-color: #0f0518;
        color: white;
        overscroll-behavior-y: none;
        font-family: 'Inter', sans-serif;
        -webkit-tap-highlight-color: transparent;
      }
      .leaflet-container {
        width: 100%;
        height: 100%;
        background: #0f0518;
        z-index: 0;
      }
      /* Otimização de Performance: Remover sombras pesadas e blur excessivo */
      .leaflet-popup-content-wrapper {
        background: #1e1b2e;
        color: white;
        border-radius: 16px;
        border: 1px solid rgba(139, 92, 246, 0.3);
      }
      .leaflet-popup-tip {
        background: #1e1b2e;
        border: 1px solid rgba(139, 92, 246, 0.3);
      }
      .leaflet-popup-content {
        margin: 0;
        line-height: 1.4;
      }
      
      /* Glass effect simplificado para Android (Performance) */
      .glass-panel, .glass-card {
        background: #1a1625;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      
      /* Apenas ativa blur em dispositivos potentes ou iOS */
      @supports (-webkit-backdrop-filter: none) {
        .glass-panel {
           background: rgba(20, 20, 30, 0.9);
           -webkit-backdrop-filter: blur(8px);
           backdrop-filter: blur(8px);
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react-leaflet": "https://aistudiocdn.com/react-leaflet@^5.0.0",
    "leaflet": "https://aistudiocdn.com/leaflet@^1.9.4",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3",
    "@capacitor/geolocation": "https://aistudiocdn.com/@capacitor/geolocation@^7.1.6",
    "@capacitor/camera": "https://aistudiocdn.com/@capacitor/camera@^7.0.2",
    "capacitor-fingerprint-auth": "https://aistudiocdn.com/capacitor-fingerprint-auth@^0.0.2"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
